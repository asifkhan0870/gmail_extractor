<!DOCTYPE html>
<html>

<head>

    <title>Gmail Lead Extractor</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow-lg border-0">

                <div class="card-body p-4">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>

                            <h1 class="mb-1">
                                Gmail Lead Extractor
                            </h1>

                            <p class="text-muted mb-0">
                                Connected as
                                <strong>{{ email }}</strong>
                            </p>

                        </div>

                        <div>

                            <span class="badge bg-success">
                                Connected
                            </span>

                        </div>

                    </div>

                    <hr>

                    <div class="d-flex justify-content-between align-items-center mb-3">

                        <h4>
                            Select Labels
                        </h4>

                        <div>

                            <button
                                type="button"
                                class="btn btn-success btn-sm"
                                onclick="selectAllLabels()">

                                Select All

                            </button>

                            <button
                                type="button"
                                class="btn btn-secondary btn-sm"
                                onclick="clearLabels()">

                                Clear All

                            </button>

                        </div>

                    </div>

                    <form id="extractForm">

                        <div class="label-container">

                            {% for label in labels %}

                            <div class="label-item">

                                <input
                                    type="checkbox"
                                    class="form-check-input"
                                    name="labels"
                                    value="{{ label['id'] }}"
                                    id="lbl{{ loop.index }}">

                                <label
                                    for="lbl{{ loop.index }}"
                                    class="ms-2">

                                    {{ label["name"] }}

                                </label>

                            </div>

                            {% endfor %}

                        </div>

                        <button
                            type="button"
                            class="btn btn-primary btn-lg mt-4"
                            onclick="startExtraction()">

                            Start Extraction

                        </button>

                    </form>

                    <hr class="my-4">

                    <h4>
                        Live Progress
                    </h4>

                    <div class="progress mt-3">

                        <div
                            id="progressBar"
                            class="progress-bar progress-bar-striped progress-bar-animated"
                            style="width:0%">

                            0%

                        </div>

                    </div>

                    <div class="stats-grid">

                        <div class="stat-card">
                            <h3>Status</h3>
                            <p id="statusText">Waiting</p>
                        </div>

                        <div class="stat-card">
                            <h3>Current Label</h3>
                            <p id="currentLabel">-</p>
                        </div>

                        <div class="stat-card">
                            <h3>Messages Scanned</h3>
                            <p id="processedCount">0</p>
                        </div>

                        <div class="stat-card">
                            <h3>Emails Found</h3>
                            <p id="emailsFound">0</p>
                        </div>

                    </div>

                    <div class="label-progress">

                        <h4>
                            Label Progress
                        </h4>

                        <div class="small-bar">

                            <div
                                id="labelBar"
                                class="small-fill">
                            </div>

                        </div>

                        <p id="labelCounter">
                            0 / 0
                        </p>

                    </div>

                    <div class="text-center mt-4">

                        <a
                            id="downloadBtn"
                            class="btn btn-success btn-lg"
                            style="display:none;">

                            Download Excel

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
const USER_EMAIL = "{{ email }}";
</script>

<script src="/static/app.js"></script>

</body>
</html>
